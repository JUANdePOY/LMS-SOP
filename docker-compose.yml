version: '3.9'

services:
  pafr-mysql:
    image: mysql:8.0
    container_name: pafr-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: pafr
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./pafr_database_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./pafr_seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql
      - ./announcements.sql:/docker-entrypoint-initdb.d/03-announcements.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - pafr-network

  pafr-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pafr-server
    restart: unless-stopped
    depends_on:
      pafr-mysql:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 5000
      DB_HOST: pafr-mysql
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_NAME: pafr
      DB_PORT: 3306
    ports:
      - "5001:5000"
    volumes:
      - ./server:/app
      - /app/node_modules
    networks:
      - pafr-network

  pafr-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: pafr-client
    restart: unless-stopped
    depends_on:
      - pafr-server
    ports:
      - "3000:5173"
    environment:
      VITE_DOCKER: 'true'
    volumes:
      - ./client:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
    networks:
      - pafr-network

volumes:
  mysql-data:

networks:
  pafr-network:
    driver: bridge
